                <script>
          var vars = {
            question_file: "../FinalBRDs/level3Easy_v7.brd"
          };

          function getCommShell() {
            if (window.CTATCommShell && window.CTATCommShell.commShell)
              return window.CTATCommShell.commShell;
            if (window.commShell) return window.commShell;
            return null;
          }

          function ctatOnload() {
            initTutor(vars);

            (function waitForShell() {
              var shell = getCommShell();
              if (!shell) { setTimeout(waitForShell, 50); return; }

              var logLibrary = shell.getLoggingLibrary();
              if (!logLibrary) {
                console.error("Logging library not available.");
                return;
              }

              logLibrary.assignLogListener(function (xmlMessage) {
                window.parent.postMessage(
                  { kind: "CTAT_LOG_EVENT", ts: new Date().toISOString(), payload: { xml: String(xmlMessage) } },
                  "*"
                );
              });

              var doneEl = document.getElementById("done");
              if (doneEl) {
                doneEl.addEventListener("click", function () {
                  window.parent.postMessage(
                    { kind: "CTAT_PROBLEM_DONE", ts: new Date().toISOString(), payload: {} },
                    "*"
                  );
                });
              }

              console.log("CTAT logging listener attached");
            })();
          }
        </script>
